name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: License check (production)
        run: npx license-checker --production --failOn "GPL;AGPL;LGPL"

      - name: npm audit
        run: npm audit --audit-level=critical

      - name: Vitest
        run: npm test

      - name: Next.js build
        run: npm run build

      - name: Smoke test (extractor)
        run: npm run smoke
